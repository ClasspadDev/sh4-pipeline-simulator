<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH4 Pipeline Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="pako.min.js"></script>
</head>
<body>
    <div class="desc">
        <h1>SH4 Pipeline Simulator</h1>
        <div class="quick-actions">
            <div>This is very much Work In Progress. PRs welcome <a href="https://gitlab.com/skmp/sh4-sim">@gitlab</a></div>
            <br />
            <span>
                Share:
                <button onclick="copy_url(event);" class="copy-link tooltip"><span class="tooltiptext">Copied!</span>Copy Link 🔗</button>
                |
                <button onclick="window.print()" class="tooltip">Print 🖨️</button>
            </span>
        </div>

        <textarea class="src" oninput="do_sim();">
; Basic examples from the manual (not all of these are simulated correctly). Unsupported instructions are commented out
; # means a section split


# Serial execution: non-parallel-executable instructions

SHAD R0,R1
ADD R2,R3


# Parallel execution: parallel-executable and no dependency

ADD R2,R1
MOV.L @R4,R5


# Issue rate: multi-step instruction

AND.B #1,@(R0,GBR)
MOV R1,R2


# Flow dependency

## Zero-cycle latency

MOV R0,R1
ADD R2,R1


## 1-cycle latency

ADD R2,R1
MOV.L @R1,R1

## 2-cycle latency / 1 cycle stall 
nop
MOV.L @R1,R1
ADD R0,R1

## 2-cycle latency / 1 cycle increase
nop
MOV.L @R1,R1
SHAD R1,R2

## 4-cycle latency for FPSCR

FADD FR1,FR2
nop
; STS FPUL,R1
nop
; STS FPSCR,R2

## 7-cycle latency for lower FR, 8-cycle latency for upper FR

; FADD DR0,DR2
FMOV FR3,FR5
FMOV FR2,FR4

## 3-cycle latency for lower FR / 4-cycle latency for upper FR
; FLOAT FPUL,DR0
; FMOV.S FR1,@-R15

## Zero-cycle latency / 3-cycle increase
FLDI1 FR3
FIPR FV0,FV4

## 2-cycle latency / 1-cycle increase
FMOV @R1,XD14
FTRV XMTRX,FV0

## Effectively 1-cycle latency for consecutive LDS/FLOAT instructions
;LDS R0,FPUL
;FLOAT FPUL,FR0
;LDS R1,FPUL
;FLOAT FPUL,R1

## Effectively 1-cycle latency for consecutive FTRC/STS instructions

;FTRC FR0,FPUL
;STS FPUL,R0
;FTRC FR1,FPUL
;STS FPUL,R1

# Output dependency

## 11-cycle latency / WaW cycles -2 / The registers are written-back in program order.

FSQRT FR4
FMOV FR0,FR4

## 7-cycle latency for lower FR / 8-cycle latency for upper FR / WaW in program order

; FADD DR0,DR2
FMOV FR0,FR3

# Anti-flow dependency

## 1 stall cycle
; FTRV XMTRX,FV0
; FMOV @R1,XD0

## 2 stall cycles
; FADD DR0,DR2
FMOV FR4,FR1
        </textarea>
    </div>
    <div class="options">
        <span>Options:
        <input type="checkbox" id="hide-crosshairs">
        <label for="hide-crosshairs">Hide Crosshairs</label>
        <input type="checkbox" id="plain-format" onclick="event.target.checked?document.body.classList.add('plain-format') : document.body.classList.remove('plain-format');">
        <label for="plain-format">Plain Format</label>
        <input type="checkbox" id="less-borders" onclick="event.target.checked?document.body.classList.add('less-borders') : document.body.classList.remove('less-borders');">
        <label for="less-borders">Less Borders</label>
        <!-- <input type="checkbox" id="paginate-table" onclick="do_sim();">
        <label for="paginate-table">Paginate Table</label> -->
        </span>
    </div>
    <div class="results">

    </div>
    <script src="sim.js"></script>
</body>
</html>
