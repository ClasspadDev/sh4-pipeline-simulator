<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH4 Pipeline Simulator</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f4f4f4;
            margin: 2em;
            padding: 0;
        }

        .src {
            width: 99%;
            height: 10em;
        }

        body.error {
            background-color: red;
        }

        .result {
            white-space: nowrap;
            overflow:scroll;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 4em;
        }

        td {
            cursor: help;
            min-width: 3em;

            border: 1px solid black; padding: 5px;
        }

        td:not(:first-child) {
            text-align: center;
        }

        tr:first-child td:first-child {
            font-weight: bold;
            text-align: center;
        }

        tr td:first-child {
            position: sticky;
            left: 0px;
            border-right: 2px solid black;
        }

        tr:nth-child(even), tr:nth-child(even) td {
            background-color: #e2e2e2;
        }
        tr:nth-child(odd), tr:nth-child(odd) td {
            background-color: #f4f4f4;
        }

        td.full {
            background-color: #20A040 !important;
            color: wheat;
        }
        td.stall {
            background-color: #804020 !important;
            color: wheat;
        }

        /* Tooltip container */
        .tooltip {
            position: relative;
        }

        /* Tooltip text */
        .tooltip .tooltiptext {
            visibility: hidden;
            /* width: 120px; */
            background-color: #555;
            color: #fff;
            text-align: left;
            line-height: 1.5;
            border-radius: 5px;
            padding: 5px 7px;
            position: absolute;
            z-index: 1;
            bottom: 135%; /* Position the tooltip above the text */
            left: 0;
            margin-left: 0; /* Use margin to center the tooltip */
            opacity: 0; /* Start with tooltip hidden */
            transition: opacity 0.3s;
        }

        /* Tooltip arrow */
        .tooltip .tooltiptext::after {
            content: "";
            position: absolute;
            top: 100%; /* Bottom of the tooltip */
            left: 2em;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #555 transparent transparent transparent; /* Arrow color */
        }

        /* Show the tooltip text when hovering over the tooltip container */
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
        .tooltiptext:hover {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="desc">
    <h1>SH4 Pipeline Simulator</h1>
    <textarea class="src" oninput="do_sim()">
    MOV.L	 @R1,R1
    ADD	 R0,R1
    mov	r5,r1
    add	r1,r1
    add	r1,r5
    mov	r5,r0
    shll2	r0
    shll2	r0
    sub	r5,r0
    add r0, r0
    MOV R0, R0
    mov 0, r0 ; this is a test
    add r0, r0
    mov.l @r0, r0
    add r0, r0
    MOV R0, R0
    mov 0, r0 ; this is a test
    add r0, r0
    mov.l @r0, r0
    </textarea>
</div>
<div class="result">

</div>

<script>

    const Flags = {
        L: 16,
    }

    const Stage = {
        I: 0,
        D: 1,
        EX: 3,
        SX: 4,
        F1: 5,
        F2: 6,
        F3: 7,
        NA: 8,
        MA: 9,
        S: 10,
        FS: 11,
        Count: 12,

        DL: 2 /* D */ | Flags.L
    };

    const StageNames = { }
    StageNames[Stage.I] = "I";
    StageNames[Stage.D] = "D";
    StageNames[Stage.EX] = "EX";
    StageNames[Stage.SX] = "SX";
    StageNames[Stage.F1] = "F1";
    StageNames[Stage.F2] = "F2";
    StageNames[Stage.F3] = "F3";
    StageNames[Stage.NA] = "NA";
    StageNames[Stage.MA] = "MA";
    StageNames[Stage.S] = "S";
    StageNames[Stage.FS] = "FS";
    StageNames[Stage.DL] = "[D]";

    const Group = {
        MT: "MT",
        EX: "EX",
        BR: "BR",
        LS: "LS",
        FE: "FE",
        CO: "CO"
    };

    function isParallel(group1, group2) {
        if (group1 == Group.CO || group2 == Group.CO)
            return false;
        else
            return group1 != group2;
    }

    const Patterns = {
        // 1-step operation: 1 issue cycle
        // EXT[SU].[BW], MOV, MOV#, MOVA, MOVT, SWAP.[BW], XTRCT, ADD*, CMP*, 
        // DIV*, DT, NEG*, SUB*, AND, AND#, NOT, OR, OR#, TST, TST#, XOR, XOR#, 
        // ROT*, SHA*, SHL*, BF*, BT*, BRA, NOP, CLRS, CLRT, SETS, SETT, 
        // LDS to FPUL, STS from FPUL/FPSCR, FLDI0, FLDI1, FMOV, FLDS, FSTS, 
        // single-/double-precision FABS/FNEG
        1: [
            [Stage.I, Stage.D, Stage.EX, Stage.NA, Stage.S]
        ],

        // Load/store: 1 issue cycle
	    // MOV.[BWL]. FMOV*@, LDS.L to FPUL, LDTLB, PREF, STS.L from FPUL/FPSCR
        2: [
            [Stage.I, Stage.D, Stage.EX, Stage.MA, Stage.S]
        ],

        // GBR-based load/store: 1 issue cycle
	    // MOV.[BWL]@(d,GBR)
        3: [
            [Stage.I, Stage.D, Stage.SX, Stage.MA, Stage.S]
        ],

        // JMP, RTS, BRAF: 2 issue cycles
        4: [
            [Stage.I, Stage.D, Stage.EX, Stage.NA, Stage.S]
            [null   , null   , Stage.DL, Stage.EX, Stage.NA, Stage.S]
        ],

        // TST.B: 3 issue cycles
        5: [
            [Stage.I, Stage.D, Stage.SX, Stage.MA, Stage.S]
            [null   , null   , Stage.DL, Stage.SX, Stage.NA, Stage.S],
            [null   , null   , null    , Stage.DL, Stage.SX, Stage.MA, Stage.S]
        ],

        // AND.B, OR.B, XOR.B: 4 issue cycles
        6: [
            [Stage.I, Stage.D, Stage.SX, Stage.MA, Stage.S]
            [null   , null   , Stage.DL, Stage.SX, Stage.NA, Stage.S],
            [null   , null   , null    , Stage.DL, Stage.SX, Stage.NA, Stage.S]
            [null   , null   , null    , null    , Stage.DL, Stage.SX, Stage.MA, Stage.S]
        ],

        // TAS.B: 5 issue cycles
        6: [
            [Stage.I, Stage.D, Stage.EX, Stage.MA, Stage.S]
            [null   , null   , Stage.DL, Stage.EX, Stage.NA, Stage.S],
            [null   , null   , null    , Stage.DL, Stage.EX, Stage.NA, Stage.S]
            [null   , null   , null    , null    , Stage.DL, Stage.EX, Stage.MA, Stage.S]
        ],

        // Single-precision floating-point computation: 1 issue cycle
        // FCMP/EQ,FCMP/GT, FADD,FLOAT,FMAC,FMUL,FSUB,FTRC,FRCHG,FSCHG
        36: [
            [Stage.I, Stage.D, Stage.F1, Stage.F2, Stage.FS]
        ]

    };

    function index_of_part(asm, part) {
        for (let i = 0; i < asm.length; i++) {
            if (asm[i] == part || asm[i] == `@${part}`)
                return i;
        }
        throw new Error(`Part ${part} not found in ${asm}`);
    }
    function reads_rm() {
        return [this.variant[index_of_part(this.asm, "Rm")].replace("@", "")];
    }
    function reads_rn() {
        return [this.variant[index_of_part(this.asm, "Rn")].replace("@", "")];
    }

    function writes_rn() {
        return [this.variant[index_of_part(this.asm, "Rn")].replace("@", "")];
    }

    function reads_none() {
        return [];
    }

    function writes_none() {
        return [];
    }

    function writes_r0() {
        return ["R0"];
    }

    function reads_rmn() {
        return [...new Set([...reads_rm.apply(this), ...reads_rn.apply(this)])];
    }

    function reads_rmnsr() {
        return [...reads_rmn.apply(this), "SR"];
    }

    function writes_rnsr() {
        return [...writes_rn.apply(this), "SR"];
    }

    function reads_rnsr() {
        return [...reads_rn.apply(this), "SR"];
    }

    function reads_r0() {
        return ["R0"];
    }

    function writes_sr() {
        return ["SR"]
    }

    function reads_r0m() {
        return  [...new Set(["R0", this.variant[index_of_part(this.asm, "Rn")]])];
    }

    function reads_fn() {
        return [this.variant[index_of_part(this.asm, "FRn")]];
    }

    function writes_fn() {
        return [this.variant[index_of_part(this.asm, "FRn")]];
    }

    function writes_fpul() {
        return ["FPUL"];
    }

    function reads_fpul() {
        return ["FPUL"];
    }

    function reads_fnr0n() {
        return [...new Set([this.variant[index_of_part(this.asm, "FRn")], "R0", this.variant[index_of_part(this.asm, "Rn")]])];
    }


    const Instructions = {
         1: {asm: ["EXTS.B", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         2: {asm: ["EXTS.W", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         3: {asm: ["EXTU.B", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         4: {asm: ["EXTU.W", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         5: {asm: ["MOV", "Rm","Rn"], group: Group.MT, issue: 1, latency: 0, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         6: {asm: ["MOV", "#imm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_rn },
         7: {asm: ["MOVA", "@(disp,PC)","R0"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_r0 },
         8: {asm: ["MOV.W", "@(disp,PC)","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_none, writes: writes_rn },
         9: {asm: ["MOV.L", "@(disp,PC)","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_none, writes: writes_rn },
        10: {asm: ["MOV.B", "@Rm","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_rm, writes: writes_rn },
        11: {asm: ["MOV.W", "@Rm","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_rm, writes: writes_rn },
        12: {asm: ["MOV.L", "@Rm","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_rm, writes: writes_rn },

        49: {asm: ["ADD", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn },
        50: {asm: ["ADD", "#imm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_rn },
        51: {asm: ["ADDC", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmnsr, writes: writes_rn },
        52: {asm: ["ADDV", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmnsr, writes: writes_rn },
        53: {asm: ["CMP/EQ", "#imm","R0"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_r0, writes: writes_sr },
        54: {asm: ["CMP/EQ", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        55: {asm: ["CMP/GE", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        56: {asm: ["CMP/GT", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        57: {asm: ["CMP/HI", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        58: {asm: ["CMP/HS", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        59: {asm: ["CMP/PL", "Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_sr },
        60: {asm: ["CMP/PZ", "Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_sr },
        61: {asm: ["CMP/STR", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        62: {asm: ["DIV0S", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        63: {asm: ["DIV0U"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_sr },
        64: {asm: ["DIV1", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rnsr },

        67: {asm: ["DT", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rnsr },

        73: {asm: ["NEG", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },

        75: {asm: ["SUB", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn },

        78: {asm: ["AND", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn  },
        79: {asm: ["AND", "#imm","R0"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_r0 },

        81: {asm: ["NOT", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn  },
        82: {asm: ["OR", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn  },
        83: {asm: ["OR", "#imm","R0"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_r0, writes: writes_r0  },

        86: {asm: ["TST", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr  },
        87: {asm: ["TST", "#imm","R0"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_r0, writes: writes_sr  },

        89: {asm: ["XOR", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn  },
        90: {asm: ["XOR", "#imm","R0"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_r0, writes: writes_r0  },

        92: {asm: ["ROTL", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rnsr, writes: writes_rnsr },
        93: {asm: ["ROTR", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rnsr, writes: writes_rnsr },
        94: {asm: ["ROTCL", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rnsr, writes: writes_rnsr },
        95: {asm: ["ROTCR", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rnsr, writes: writes_rnsr },
        96: {asm: ["SHAD", "Rm", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn },
        97: {asm: ["SHAL", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rnsr },
        98: {asm: ["SHAR", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rnsr },
        99: {asm: ["SHLD", "Rm", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn },
        100: {asm: ["SHLL", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rnsr },
        101: {asm: ["SHLL2", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rn },
        102: {asm: ["SHLL8", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rn },
        103: {asm: ["SHLL16", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rn },
        104: {asm: ["SHLR", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rnsr },
        105: {asm: ["SHLR2", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rn },
        106: {asm: ["SHLR8", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rn },
        107: {asm: ["SHLR16", "Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_rn },

        119: {asm: ["NOP"], group: Group.MT, issue: 1, latency: 0, pattern: Patterns[1], reads: reads_none, writes: writes_none },

        121: {asm: ["CLRS"], group: Group.CO, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_sr },
        122: {asm: ["CLRT"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_sr },
        123: {asm: ["SETS"], group: Group.CO, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_sr },
        124: {asm: ["SETT"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_sr },


        171: {asm: ["FLDI0", "FRn"], group: Group.LS, issue: 1, latency: 0, pattern: Patterns[1], reads: reads_none, writes: writes_fn },
        172: {asm: ["FLDI1", "FRn"], group: Group.LS, issue: 1, latency: 0, pattern: Patterns[1], reads: reads_none, writes: writes_fn },
        173: {asm: ["FMOV", "FRm","FRn"], group: Group.LS, issue: 1, latency: 0, pattern: Patterns[1], reads: reads_fn, writes: writes_fn },
        174: {asm: ["FMOV.S","@Rm","FRn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_rm, writes: writes_fn },
        // 175: {asm: ["FMOV.S", "@Rm+","FRn"], group: Group.LS, issue: 1, latency: 1/2, pattern: Patterns[2] },
        176: {asm: ["FMOV.S", "@(R0,Rm)","FRn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_r0m, writes: writes_fn },
        177: {asm: ["FMOV.S", "FRm","@Rn"], group: Group.LS, issue: 1, latency: 1, pattern: Patterns[2], reads: reads_fn, writes: writes_none },
        178: {asm: ["FMOV.S", "FRm","@-Rn"], group: Group.LS, issue: 1, latency: 1, pattern: Patterns[2], reads: reads_fn, writes: writes_rn },
        179: {asm: ["FMOV.S", "FRm","@(R0,Rn)"], group: Group.LS, issue: 1, latency: 1, pattern: Patterns[2], reads: reads_fnr0n, writes: writes_none },
        180: {asm: ["FLDS", "FRm","FPUL"], group: Group.LS, issue: 1, latency: 0, pattern: Patterns[1], reads: reads_fn, writes: writes_fpul },
        181: {asm: ["FSTS", "FPUL","FRn"], group: Group.LS, issue: 1, latency: 0, pattern: Patterns[1], reads: reads_fpul, writes: writes_fn },
    };

    // Registers
    // 16 gprs for now, as a bitfield
    let instructions_rainbow = {}

    function cartesianProduct(arrays) {
        return arrays.reduce((acc, array) => {
            return acc.flatMap(accItem => {
                return array.map(arrayItem => {
                    return [...accItem, arrayItem];
                });
            });
        }, [[]]);
    }

    function deepcopy(v) {
        return JSON.parse(JSON.stringify(v))
    }

    function getVariants(str) {
        switch(str) {
            case "Rm":
            case "Rn":
                return ["R0", "R1", "R2", "R3", "R4", "R5", "R6", "R7", "R8", "R9", "R10", "R11", "R12", "R13", "R14", "R15"];
            case "@Rm":
            case "@Rn":
                return ["@R0", "@R1", "@R2", "@R3", "@R4", "@R5", "@R6", "@R7", "@R8", "@R9", "@R10", "@R11", "@R12", "@R13", "@R14", "@R15"];
            case "#imm":
                return Array.from({ length: 256 }, (_, index) => `${index}`);
            case "@(disp,PC)":
                return Array.from({ length: 256 }, (_, index) => `@(${index},PC)`);
            case "@(R0,Rm)":
            case "@(R0,Rn)":
                return ["@(R0,R0)", "@(R0,R1)", "@(R0,R2)", "@(R0,R3)", "@(R0,R4)", "@(R0,R5)", "@(R0,R6)", "@(R0,R7)", "@(R0,R8)", "@(R0,R9)", "@(R0,R10)", "@(R0,R11)", "@(R0,R12)", "@(R0,R13)", "@(R0,R14)", "@(R0,R15)"];
            case "FRm":
            case "FRn":
                return ["FR0", "FR1", "FR2", "FR3", "FR4", "FR5", "FR6", "FR7", "FR8", "FR9", "FR10", "FR11", "FR12", "FR13", "FR14", "FR15"];
            default:
                return [str]
        }
    }
    for (const index of Object.keys(Instructions)) {
        const insn = Instructions[index];

        const parts = insn.asm;

        let insn_variants = cartesianProduct(parts.map(getVariants));
        for (insn_variant of insn_variants) {
            let insn_rain = deepcopy(insn)
            insn_rain.reads = insn.reads;
            insn_rain.writes = insn.writes;
            insn_rain.variant = insn_variant;
            instructions_rainbow[((insn_variant[0] + " " + insn_variant.slice(1).join(",")).toLowerCase()).trim()] = insn_rain;
        }
    }

    function assemble(lines) {
        let rv = []
        let pc = 0;
        for (line of lines.split("\n")) {
            let processed = line.split(/(;|\/\/)/)[0].replace("\t", " ").trim();

            if (processed.length) {
                processed = processed.replace(/\s+/, " ").replace(", ", ",").toLowerCase();
                let def = instructions_rainbow[processed];
                if (!def)
                    return null;
                rv.push({pc: pc, text: processed, def: def, pipe: -1, step: -1});
                pc += 2;
            }
        }

        return rv;
    }

    function generateTable(tableArray) {
        // Determine the number of rows by finding the length of the first column
        const numRows = tableArray[0].length;

        // Create a table element
        const table = document.createElement('table');
        
        // Iterate over each row index
        for (let rowIndex = 0; rowIndex < numRows; rowIndex++) {
            // Create a new row
            const row = document.createElement('tr');

            // Iterate over each column to get the data for the current row
            tableArray.forEach(colData => {
                // Create a new cell (td element)
                const cell = document.createElement('td');
                if (colData[rowIndex].explanation) {
                    cell.innerHTML = `<span class="tooltiptext">${colData[rowIndex].explanation}</span>${colData[rowIndex].text}`;
                }
                cell.classList.add("tooltip");
                if (colData[rowIndex].stall) {
                    cell.classList.add("stall");
                }
                if (colData[rowIndex].full) {
                    cell.classList.add("full");
                }

                // Append the cell to the row
                row.appendChild(cell);
            });

            // Append the row to the table
            table.appendChild(row);
        }

        // Append the table to the body (or any other container element)
        document.querySelector(".result").innerHTML = ""
        document.querySelector(".result").appendChild(table);
    }

    function do_sim() {
        let insns = assemble(document.querySelector(".src").value)
        if (!insns) {
            document.body.classList.add("error")
            return;
        }

        document.body.classList.remove("error")

        let pc = 0;
        let cycle = 0;
        let program_order = 0;
        let in_flight = []

        let table = [];

        table.push(insns.map(x => { return { 
            text: `${x.pc.toString(16).padStart(8,"0")} ${x.text}`, 
            explanation:`group: ${x.def.group}, issue: ${x.def.issue}, latency: ${x.def.latency}${x.def.desc ? "<br/>" + x.def.desc : ""}` 
        } }));

        table[0].unshift({text: "inst\\cycle", explanation: "Instruction vs Cycle Number"});

        let provides = { 
            "R0":  [],
            "R1":  [],
            "R2":  [],
            "R3":  [],
            "R4":  [],
            "R5":  [],
            "R6":  [],
            "R7":  [],
            "R8":  [],
            "R9":  [],
            "R10": [],
            "R11": [],
            "R12": [],
            "R13": [],
            "R14": [],
            "R15": [],

            "FR0": [],
            "FR1": [],
            "FR2": [],
            "FR3": [],
            "FR4": [],
            "FR5": [],
            "FR6": [],
            "FR7": [],
            "FR8": [],
            "FR9": [],
            "FR10": [],
            "FR11": [],
            "FR12": [],
            "FR13": [],
            "FR14": [],
            "FR15": [],

            "SR": [],
            "FPUL": []
        };

        function data_provided_by(insn, provide_insns) {
            return provide_insns.some(x => x.program_order < insn.program_order);
        }

        for(;;) {
            if (in_flight.length == 0 && pc == insns.length)
                break;
            
            table.push(Array.from({length: insns.length}, (_, index) => { return { text: "", explanation: ""}}));
            let last_column = table[table.length - 1];

            let toremove = [];
            for (insn of in_flight) {
                if (insn.step == insn.def.latency + 1) {
                    insn.def.writes().forEach(reg => provides[reg] = provides[reg].filter(e => e !== insn));
                }
                    
                let current_stage = insn.def.pattern[0][insn.step];
                let next_stage = insn.def.pattern[0][insn.step+1];
                let current_stage_name = StageNames[current_stage];
                let next_stage_name = StageNames[next_stage];

                const in_next_stage = in_flight.filter(x => x != insn && x.def.pattern[0][x.step] == next_stage);

                if (in_next_stage.length == 2 ) {
                    last_column[insn.pc/2] = { stall:true, text: `*${current_stage_name}*`, explanation: `Already two instructions @ Stage ${next_stage_name}<br/> ${in_next_stage.map(x => `[${x.def.group}: ${x.text}]`).join("<br />")}` };
                    insn.stall = true;
                } else if ( !in_next_stage.every(x => isParallel(x.def.group, insn.def.group))) {
                    last_column[insn.pc/2] = { stall:true, text: `*${current_stage_name}*`, explanation: `Resource hazard: ${insn.def.group}<br/>${in_next_stage.filter(x => !isParallel(x.def.group, insn.def.group)).map(x => `[${x.def.group}: ${x.text}]`).join("<br/>")}` };
                    insn.stall = true;
                } else if ( (current_stage != Stage.I) && insn.def.reads().some(reg => data_provided_by(insn, provides[reg]))) {
                    last_column[insn.pc/2] = { stall:true, text: `|${current_stage_name}|`, explanation: `Flow Dependency<br/>${insn.def.reads().map(reg => provides[reg].filter( provides_insn => provides_insn.program_order < insn.program_order).map(provides_insn => `${reg}: ${provides_insn.text}`)).flat(Infinity).join("<br/>")}` };
                    insn.stall = true;
                } else if ( (current_stage != Stage.I) && insn.def.writes().some(reg => data_provided_by(insn, provides[reg]))) {
                    last_column[insn.pc/2] = { stall:true, text: `^${current_stage_name}^`, explanation: `Output Dependency<br/>${insn.def.writes().map(reg => provides[reg].filter( provides_insn => provides_insn.program_order < insn.program_order).map(provides_insn => `${reg}: ${provides_insn.text}`)).flat(Infinity).join("<br/>")}` };
                    insn.stall = true;
                } else {
                    insn.stall = false;
                    insn.step++;

                    if (!next_stage) {
                        toremove.push(insn);
                    } else {
                        last_column[insn.pc/2] = { text: StageNames[next_stage], explanation: `No Stall, Group: ${insn.def.group}` };
                    }
                }
            }

            for (insn of toremove) {
                in_flight = in_flight.filter(e => e !== insn)
            }

            const in_i_stage = in_flight.filter(insn => insn.def.pattern[0][insn.step] == Stage.I);

            for (let pipe = 0; pipe < 2-in_i_stage.length && pc != insns.length; pipe++) {
                let insn = insns[pc++];
                insn.step = 0;
                insn.program_order = program_order++;
                insn.stall = false;
                in_flight.push(insn);
                insn.def.writes().forEach(reg => provides[reg].push(insn));
                last_column[insn.pc/2] = {text: StageNames[Stage.I], explanation: `No Stall, Group: ${insn.def.group}`};
            }

            for (let stage = 0; stage < Stage.Count; stage++) {
                const in_stage_exec = in_flight.filter(x => x.def.pattern[0][x.step] == stage && !x.stall);
                if (in_stage_exec.length == 2) {
                    in_stage_exec.forEach(insn => {
                        last_column[insn.pc/2].full = true;
                        last_column[insn.pc/2].explanation += `<br/>Fully Utilized`;
                    });
                }
            }   

            cycle++;
            last_column.unshift({text: cycle, explanation: "Cycle Number"})
        }

        generateTable(table);

    }

    do_sim();
</script>
