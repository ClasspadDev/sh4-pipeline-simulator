<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH4 Pipeline Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 2em;
            padding: 0;
        }

        .src {
            width: 99%;
            height: 10em;
        }

        body.error {
            background-color: red;
        }

        .result {
            white-space: nowrap;
        }

        td {
            cursor: help;
        }
    </style>
</head>
<body>

<h1>SH4 Pipeline Simulator</h1>
<textarea class="src" oninput="do_sim()">
add r0, r0
MOV R0, R0
mov 0, r0 ; this is a test
add r0, r0
mov.l @r0, r0
add r0, r0
MOV R0, R0
mov 0, r0 ; this is a test
add r0, r0
mov.l @r0, r0    
</textarea>

<div class="result">

</div>

<script>

    const Flags = {
        L: 16,
    }

    const Stage = {
        I: 0,
        D: 1,
        EX: 3,
        SX: 4,
        F1: 5,
        F2: 6,
        F3: 7,
        NA: 8,
        MA: 9,
        S: 10,
        FS: 11,
        Count: 12,

        DL: 2 /* D */ | Flags.L
    };

    const StageNames = { }
    StageNames[Stage.I] = "I";
    StageNames[Stage.D] = "D";
    StageNames[Stage.EX] = "EX";
    StageNames[Stage.SX] = "SX";
    StageNames[Stage.F1] = "F1";
    StageNames[Stage.F2] = "F2";
    StageNames[Stage.F3] = "F3";
    StageNames[Stage.NA] = "NA";
    StageNames[Stage.MA] = "MA";
    StageNames[Stage.S] = "S";
    StageNames[Stage.FS] = "FS";
    StageNames[Stage.DL] = "[D]";

    const Group = {
        MT: "MT",
        EX: "EX",
        BR: "BR",
        LS: "LS",
        FE: "FE",
        CO: "CO"
    };

    function isParallel(group1, group2) {
        if (group1 == Group.CO || group2 == Group.CO)
            return false;
        else
            return group1 != group2;
    }

    const Patterns = {
        // 1-step operation: 1 issue cycle
        // EXT[SU].[BW], MOV, MOV#, MOVA, MOVT, SWAP.[BW], XTRCT, ADD*, CMP*, 
        // DIV*, DT, NEG*, SUB*, AND, AND#, NOT, OR, OR#, TST, TST#, XOR, XOR#, 
        // ROT*, SHA*, SHL*, BF*, BT*, BRA, NOP, CLRS, CLRT, SETS, SETT, 
        // LDS to FPUL, STS from FPUL/FPSCR, FLDI0, FLDI1, FMOV, FLDS, FSTS, 
        // single-/double-precision FABS/FNEG
        1: [
            [Stage.I, Stage.D, Stage.EX, Stage.NA, Stage.S]
        ],

        // Load/store: 1 issue cycle
	    // MOV.[BWL]. FMOV*@, LDS.L to FPUL, LDTLB, PREF, STS.L from FPUL/FPSCR
        2: [
            [Stage.I, Stage.D, Stage.EX, Stage.MA, Stage.S]
        ],

        // GBR-based load/store: 1 issue cycle
	    // MOV.[BWL]@(d,GBR)
        3: [
            [Stage.I, Stage.D, Stage.SX, Stage.MA, Stage.S]
        ],

        // JMP, RTS, BRAF: 2 issue cycles
        4: [
            [Stage.I, Stage.D, Stage.EX, Stage.NA, Stage.S]
            [null   , null   , Stage.DL, Stage.EX, Stage.NA, Stage.S]
        ],

        // TST.B: 3 issue cycles
        5: [
            [Stage.I, Stage.D, Stage.SX, Stage.MA, Stage.S]
            [null   , null   , Stage.DL, Stage.SX, Stage.NA, Stage.S],
            [null   , null   , null    , Stage.DL, Stage.SX, Stage.MA, Stage.S]
        ],

        // AND.B, OR.B, XOR.B: 4 issue cycles
        6: [
            [Stage.I, Stage.D, Stage.SX, Stage.MA, Stage.S]
            [null   , null   , Stage.DL, Stage.SX, Stage.NA, Stage.S],
            [null   , null   , null    , Stage.DL, Stage.SX, Stage.NA, Stage.S]
            [null   , null   , null    , null    , Stage.DL, Stage.SX, Stage.MA, Stage.S]
        ],

        // TAS.B: 5 issue cycles
        6: [
            [Stage.I, Stage.D, Stage.EX, Stage.MA, Stage.S]
            [null   , null   , Stage.DL, Stage.EX, Stage.NA, Stage.S],
            [null   , null   , null    , Stage.DL, Stage.EX, Stage.NA, Stage.S]
            [null   , null   , null    , null    , Stage.DL, Stage.EX, Stage.MA, Stage.S]
        ],

        // Single-precision floating-point computation: 1 issue cycle
        // FCMP/EQ,FCMP/GT, FADD,FLOAT,FMAC,FMUL,FSUB,FTRC,FRCHG,FSCHG
        36: [
            [Stage.I, Stage.D, Stage.F1, Stage.F2, Stage.FS]
        ]

    };

    function index_of_part(asm, part) {
        for (let i = 0; i < asm.length; i++) {
            if (asm[i] == part || asm[i] == `@${part}`)
                return i;
        }
        throw new Error(`Part ${part} not found in ${asm}`);
    }
    function reads_rm() {
        return [this.variant[index_of_part(this.asm, "Rm")].replace("@", "")];
    }
    function reads_rn() {
        return [this.variant[index_of_part(this.asm, "Rn")].replace("@", "")];
    }

    function writes_rn() {
        return [this.variant[index_of_part(this.asm, "Rn")].replace("@", "")];
    }

    function reads_none() {
        return [];
    }

    function writes_r0() {
        return ["R0"];
    }

    function reads_rmn() {
        return [...new Set([...reads_rm.apply(this), ...reads_rn.apply(this)])];
    }

    function reads_rmnsr() {
        return [...reads_rmn.apply(this), "SR"];
    }

    function reads_r0() {
        return ["R0"];
    }

    function writes_sr() {
        return ["SR"]
    }

    const Instructions = {
         1: {asm: ["EXTS.B", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn},
         2: {asm: ["EXTS.W", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         3: {asm: ["EXTU.B", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         4: {asm: ["EXTU.W", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         5: {asm: ["MOV", "Rm","Rn"], group: Group.MT, issue: 1, latency: 0, pattern: Patterns[1], reads: reads_rm, writes: writes_rn },
         6: {asm: ["MOV", "#imm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_rn },
         7: {asm: ["MOVA", "@(disp,PC)","R0"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_r0 },
         8: {asm: ["MOV.W", "@(disp,PC)","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_none, writes: writes_rn },
         9: {asm: ["MOV.L", "@(disp,PC)","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_none, writes: writes_rn },
        10: {asm: ["MOV.B", "@Rm","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_rm, writes: writes_rn },
        11: {asm: ["MOV.W", "@Rm","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_rm, writes: writes_rn },
        12: {asm: ["MOV.L", "@Rm","Rn"], group: Group.LS, issue: 1, latency: 2, pattern: Patterns[2], reads: reads_rm, writes: writes_rn },

        49: {asm: ["ADD", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn },
        50: {asm: ["ADD", "#imm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_rn },
        51: {asm: ["ADDC", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmnsr, writes: writes_rn },
        52: {asm: ["ADDV", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmnsr, writes: writes_rn },
        53: {asm: ["CMP/EQ", "#imm","R0"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_r0, writes: writes_sr },
        54: {asm: ["CMP/EQ", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        55: {asm: ["CMP/GE", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        56: {asm: ["CMP/GT", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        57: {asm: ["CMP/HI", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        58: {asm: ["CMP/HS", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },
        59: {asm: ["CMP/PL", "Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_sr },
        60: {asm: ["CMP/PZ", "Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rn, writes: writes_sr },
        61: {asm: ["CMP/STR", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr },

        78: {asm: ["AND", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn  },
        79: {asm: ["AND", "#imm","R0"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_none, writes: writes_r0 },

        81: {asm: ["NOT", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rm, writes: writes_rn  },
        82: {asm: ["OR", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn  },
        83: {asm: ["OR", "#imm","R0"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_r0, writes: writes_r0  },

        86: {asm: ["TST", "Rm","Rn"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_sr  },
        87: {asm: ["TST", "#imm","R0"], group: Group.MT, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_r0, writes: writes_sr  },

        89: {asm: ["XOR", "Rm","Rn"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_rmn, writes: writes_rn  },
        90: {asm: ["XOR", "#imm","R0"], group: Group.EX, issue: 1, latency: 1, pattern: Patterns[1], reads: reads_r0, writes: writes_r0  },
    };

    // Registers
    // 16 gprs for now, as a bitfield
    let instructions_rainbow = {}

    function cartesianProduct(arrays) {
        return arrays.reduce((acc, array) => {
            return acc.flatMap(accItem => {
                return array.map(arrayItem => {
                    return [...accItem, arrayItem];
                });
            });
        }, [[]]);
    }

    function deepcopy(v) {
        return JSON.parse(JSON.stringify(v))
    }

    function getVariants(str) {
        switch(str) {
            case "Rm":
            case "Rn":
                return ["R0", "R1", "R2", "R3", "R4", "R5", "R6", "R7", "R8", "R9", "R10", "R11", "R12", "R13", "R14", "R15"];
            case "@Rm":
            case "@Rn":
                return ["@R0", "@R1", "@R2", "@R3", "@R4", "@R5", "@R6", "@R7", "@R8", "@R9", "@R10", "@R11", "@R12", "@R13", "@R14", "@R15"];
            case "#imm":
                return Array.from({ length: 256 }, (_, index) => `${index}`);
            case "@(disp,PC)":
                return Array.from({ length: 256 }, (_, index) => `@(${index},PC)`);
            default:
                return [str]
        }
    }
    for (const index of Object.keys(Instructions)) {
        const insn = Instructions[index];

        const parts = insn.asm;

        let insn_variants = cartesianProduct(parts.map(getVariants));
        for (insn_variant of insn_variants) {
            let insn_rain = deepcopy(insn)
            insn_rain.reads = insn.reads;
            insn_rain.writes = insn.writes;
            insn_rain.variant = insn_variant;
            instructions_rainbow[(insn_variant[0] + " " + insn_variant.slice(1).join(",")).toLowerCase()] = insn_rain;
        }
    }

    function assemble(lines) {
        let rv = []
        let pc = 0;
        for (line of lines.split("\n")) {
            let processed = line.split(/(;|\/\/)/)[0].replace("\t", " ").trim();

            if (processed.length) {
                processed = processed.replace(/\s+/, " ").replace(", ", ",").toLowerCase();
                let def = instructions_rainbow[processed];
                if (!def)
                    return null;
                rv.push({pc: pc++, text: processed, def: def, pipe: -1, step: -1});
            }
        }

        return rv;
    }

    function generateTable(tableArray) {
        // Determine the number of rows by finding the length of the first column
        const numRows = tableArray[0].length;

        // Create a table element
        const table = document.createElement('table');
        table.style.borderCollapse = 'collapse'; // Optional: Makes the table borders collapse

        // Iterate over each row index
        for (let rowIndex = 0; rowIndex < numRows; rowIndex++) {
            // Create a new row
            const row = document.createElement('tr');

            // Iterate over each column to get the data for the current row
            tableArray.forEach(colData => {
                // Create a new cell (td element)
                const cell = document.createElement('td');
                cell.title = colData[rowIndex].explanation;
                cell.innerHTML = colData[rowIndex].text; // Set the cell's text content
                cell.style.border = '1px solid black'; // Optional: Add a border to the cell
                cell.style.padding = '5px'; // Optional: Add some padding

                // Append the cell to the row
                row.appendChild(cell);
            });

            // Append the row to the table
            table.appendChild(row);
        }

        // Append the table to the body (or any other container element)
        document.querySelector(".result").innerHTML = ""
        document.querySelector(".result").appendChild(table);
    }

    function do_sim() {
        let insns = assemble(document.querySelector(".src").value)
        if (!insns) {
            document.body.classList.add("error")
            return;
        }

        document.body.classList.remove("error")

        let pc = 0;
        let cycle = 0;
        let program_order = 0;
        let in_flight = []

        let table = [];

        pipelines = Array.from({ length: Stage.Count }, (_, index) => [null, null] )

        table.push(insns.map(x => { return { text: x.text, explanation:`pc: ${pc}` } }))
        table[0].unshift({text: "inst\\cycle", explanation: "Instruction number vs Cycle number"});

        function allPipesClear() {
            return pipelines.every(x => x.every(x => x == null));
        }

        let provides = { 
            "R0":  [],
            "R1":  [],
            "R2":  [],
            "R3":  [],
            "R4":  [],
            "R5":  [],
            "R6":  [],
            "R7":  [],
            "R8":  [],
            "R9":  [],
            "R10": [],
            "R11": [],
            "R12": [],
            "R13": [],
            "R14": [],
            "R15": [],

            "SR": [],
        };

        function data_provided_by(insn, provide_insns) {
            return provide_insns.some(x => x.program_order < insn.program_order);
        }

        for(;;) {
            if (allPipesClear() && pc == insns.length)
                break;
            cycle++;
            
            table.push(Array.from({length: insns.length}, (_, index) => { return { text: "", explanation: ""}}));
            let last_column = table[table.length - 1];


            for (let pipe = 0; pipe < 2; pipe++) {
                if (pipelines[Stage.I][pipe] === null && pc != insns.length) {
                    let insn = insns[pc++];
                    insn.program_order = program_order++;

                    pipelines[Stage.I][pipe] = insn;
                    insn.step = 0;
                    insn.pipe = pipe;
                    in_flight.push(insn)

                    insn.def.writes().forEach(reg => provides[reg].push(insn));
                }    
            }

            let toremove = [];
            for (insn of in_flight) {
                last_column[insn.pc] = {text: StageNames[insn.def.pattern[0][insn.step]], explanation: "Current stage"};
                if (insn.step == insn.def.latency + 2) {
                    insn.def.writes().forEach(reg => provides[reg] = provides[reg].filter(e => e !== insn));
                }
                if ((insn.step + 1) === insn.def.pattern[0].length) {
                    toremove.push(insn);
                    pipelines[insn.def.pattern[0][insn.step]][insn.pipe] = null;
                    continue
                }

                let current_stage = insn.def.pattern[0][insn.step];
                let next_stage = insn.def.pattern[0][insn.step+1];
                if (!pipelines[next_stage].every(x => x == null || isParallel(x.def.group, insn.def.group))) {
                    last_column[insn.pc] = { text: `*${last_column[insn.pc].text}*`, explanation: `Resource hazard: ${insn.def.group}, ${pipelines[next_stage].filter(x => x != null && !isParallel(x.def.group, insn.def.group)).map(x => `[${x.def.group}: ${x.text}]`).join(", ")}` };
                } else if ( (current_stage != Stage.I && current_stage != Stage.D) && insn.def.reads().some(reg => data_provided_by(insn, provides[reg]))) {
                    last_column[insn.pc] = { text: `|${last_column[insn.pc].text}|`, explanation: `Data hazard: ${insn.def.reads().map(reg => provides[reg].filter( provides_insn => provides_insn.program_order < insn.program_order).map(provides_insn => `${reg}: ${provides_insn.text}`).join(" | ")).join(", ")}` };
                } else {
                    pipelines[insn.def.pattern[0][insn.step]][insn.pipe] = null;
                    insn.step = insn.step + 1;

                    if (pipelines[insn.def.pattern[0][insn.step]][0] == null) {
                        pipelines[insn.def.pattern[0][insn.step]][0] = insn;
                        insn.pipe = 0
                    } else {
                        pipelines[insn.def.pattern[0][insn.step]][1] = insn;
                        insn.pipe = 1
                    }
                }
            }

            for (insn of toremove) {
                in_flight = in_flight.filter(e => e !== insn)
            }
            
            last_column.unshift({text: cycle, explanation: "Cycle number"})
        }

        generateTable(table);

    }

    do_sim();
</script>

</body>
</html>
