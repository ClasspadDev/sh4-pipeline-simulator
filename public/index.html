<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH4AL Pipeline Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="pako.min.js"></script>
</head>
<body>
    <div class="desc">
        <h1>SH4 Pipeline Simulator</h1>
        <div class="quick-actions">
            <div>Fork of <a href="https://gitlab.com/skmp/sh4-sim">sh4-sim</a></div>
            <div>This is still a work in progress. mac.w/mac.l known to not be accurate</div>
            <br />
            <span>
                Share:
                <button onclick="copy_url(event);" class="copy-link tooltip"><span class="tooltiptext">Copied!</span>Copy Link 🔗</button>
                |
                <button onclick="window.print()" class="tooltip">Print 🖨️</button>
            </span>
        </div>

        <textarea class="src" oninput="do_sim();">
; Basic examples from the manual (not all of these are simulated correctly).
; # means a section split w/ title
; ## means a section split w/ subtitle


# Serial execution: non-parallel-executable instructions
    
SHAD R0,R1
ADD R2,R3


# Parallel execution: parallel-executable and no dependency

ADD R2,R1
MOV.L @R4,R5


# Issue rate: multi-step instruction

AND.B #1,@(R0,GBR)
MOV R1,R2


# Flow dependency

## Zero-cycle latency

MOV R0,R1
ADD R2,R1


## 1-cycle latency

ADD R2,R1
MOV.L @R1,R1

## 2-cycle latency / 1 cycle stall 
nop
MOV.L @R1,R1
ADD R0,R1

## 2-cycle latency / 1 cycle increase
nop
MOV.L @R1,R1
SHAD R1,R2

## Partial stage locks, 3 stall cycles
LDS.L @R15+,PR
STC GBR,R2

## 5 stall cycles (sim is wrong here)
nop
MAC.W @R1+,@R2+

## 1, 2, 3 stalls: f1 stage can overlap f1, but not F1
MAC.W @R1+,@R2+
MAC.W @R1+,@R2+
        </textarea>
    </div>
    <div class="options">
        <span>Options:
        <input type="checkbox" id="hide-crosshairs">
        <label for="hide-crosshairs">Hide Crosshairs</label>
        <input type="checkbox" id="plain-format" onclick="event.target.checked?document.body.classList.add('plain-format') : document.body.classList.remove('plain-format');">
        <label for="plain-format">Plain Format</label>
        <input type="checkbox" id="less-borders" onclick="event.target.checked?document.body.classList.add('less-borders') : document.body.classList.remove('less-borders');">
        <label for="less-borders">Less Borders</label>
        <!-- <input type="checkbox" id="paginate-table" onclick="do_sim();">
        <label for="paginate-table">Paginate Table</label> -->
        </span>
    </div>
    <div class="results">

    </div>
    <script src="sim.js"></script>
</body>
</html>
