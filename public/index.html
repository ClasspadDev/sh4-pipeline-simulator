<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH4 Pipeline Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="pako.min.js"></script>
</head>
<body>
    <div class="desc">
        <h1>SH4 Pipeline Simulator</h1>
        <div><span>Copy Link to Source <button onclick="copy_url(event);" class="tooltip"><span class="tooltiptext">Copied!</span>🔗</button></span></div>

            <textarea class="src" oninput="do_sim();">
            and.b #0, @(r0,gbr)
            and.b #0, @(r0,gbr)
            MOV.L	 @R1,R1
            ADD	 R0,R1
            mov	r5,r1
            add	r1,r1
            add	r1,r5
            mov	r5,r0
            shll2	r0
            shll2	r0
            sub	r5,r0
            add r0, r0
            MOV R0, R0
            mov #0, r0 ; this is a test
            add r0, r0
            mov.l @r0, r0
            add r0, r0
            MOV R0, R0
            mov #0, r0 ; this is a test
            add r0, r0
            mov.l @r0, r0
            </textarea>
        </div>
        <div>
            <span>Options:
            <input type="checkbox" checked id="draw-crosshairs">
            <label for="draw-crosshairs">Draw Crosshairs</label>
            </span>
        </div>
        <div class="result">

        </div>
    <script src="sim.js"></script>
</body>
</html>
